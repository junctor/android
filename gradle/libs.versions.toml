[versions]
compileSdk = "37"
minSdk = "26"
targetSdk = "36"
jvmTarget = "17"

kotlin = "2.4.10"
compose = "2026.06.01"
androidGradlePlugin = "9.3.0"
kotlinxCoroutinesTest = "1.11.0"
ktx = "1.19.0"
ktlintGradlePlugin = "14.2.0"
appcompat = "1.7.1"
lifecycleViewmodelCompose = "2.11.0"
